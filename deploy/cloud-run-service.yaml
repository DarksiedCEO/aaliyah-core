# Cloud Run (Knative) service manifest for aaliyah-core.
#
# This is a TEMPLATE: every VAR slot is substituted by deploy/deploy.sh from the
# deployment environment (see deploy/config.example.env). Nothing here contains
# a project id, secret value, password, key, or connection string — secrets are
# resolved from Secret Manager at runtime by Cloud Run, never baked in.
#
# Apply with:  gcloud run services replace <rendered>.yaml --region ${REGION}
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ${SERVICE_NAME}
  labels:
    app: aaliyah-core
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Cloud SQL connection (Auth Proxy sidecar, unix socket /cloudsql/...).
        run.googleapis.com/cloudsql-instances: ${CLOUDSQL_INSTANCE_CONNECTION_NAME}
        # Scaling: keep a warm instance if desired; cap blast radius.
        autoscaling.knative.dev/minScale: "${MIN_INSTANCES}"
        autoscaling.knative.dev/maxScale: "${MAX_INSTANCES}"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      # One request at a time is the safe default for a stateful-feeling agent;
      # tune upward only after load evidence.
      containerConcurrency: ${CONCURRENCY}
      timeoutSeconds: ${REQUEST_TIMEOUT_SECONDS}
      serviceAccountName: ${RUNTIME_SERVICE_ACCOUNT}
      containers:
        - image: ${IMAGE}
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: AALIYAH_KMS_PROVIDER
              value: "gcp"
            - name: GCP_KMS_PROJECT_ID
              value: "${GCP_PROJECT_ID}"
            - name: GCP_KMS_LOCATION
              value: "${KMS_LOCATION}"
            - name: GCP_KMS_KEY_RING
              value: "${KMS_KEY_RING}"
            - name: GCP_KMS_CRYPTO_KEY
              value: "${KMS_CRYPTO_KEY}"
            - name: GOOGLE_OAUTH_REDIRECT_URI
              value: "${GOOGLE_OAUTH_REDIRECT_URI}"
            # --- secrets: resolved from Secret Manager, never in this file ---
            - name: AALIYAH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_DATABASE_URL}
                  key: latest
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_GOOGLE_CLIENT_ID}
                  key: latest
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_GOOGLE_CLIENT_SECRET}
                  key: latest
          resources:
            limits:
              cpu: "${CPU}"
              memory: "${MEMORY}"
          # Startup gates traffic on READINESS: an instance is not marked started
          # until Postgres is reachable (/ready pings the DB). A DB-unreachable
          # instance fails its revision rather than serving requests it can't.
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
